# Download the official Helm install script from GitHub
- name: Download Helm install script
  get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get-helm.sh
    mode: '0755'

# Run the Helm install script if Helm is not already installed
- name: Install Helm
  shell: /tmp/get-helm.sh
  args:
    creates: /usr/local/bin/helm

# Add Prometheus Helm repository for monitoring tools
- name: Add Prometheus community Helm repo
  become: false
  shell: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

# Add ArgoCD Helm repository for GitOps deployments
- name: Add ArgoCD Helm repo
  become: false
  shell: helm repo add argo https://argoproj.github.io/argo-helm
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

# Add CloudNativePG Helm repository for PostgreSQL operator
- name: Add CloudNativePG Helm repo
  become: false
  shell: helm repo add cnpg https://cloudnative-pg.github.io/charts
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

# Add NGINX Ingress Helm repository for ingress controller
- name: Add Nginx Ingress Helm repo
  become: false
  shell: helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

# Update all Helm repositories to fetch latest charts
- name: Update Helm repos
  become: false
  shell: helm repo update
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

# Create monitoring namespace if it does not already exist
- name: Create monitoring namespace
  become: false
  shell: kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

# Create argocd namespace if it does not already exist
- name: Create argocd namespace
  become: false
  shell: kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

# Create cnpg-system namespace for CloudNativePG components
- name: Create cnpg-system namespace
  become: false
  shell: kubectl create namespace cnpg-system --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

# Create ingress-nginx namespace for ingress controller
- name: Create ingress-nginx namespace
  become: false
  shell: kubectl create namespace ingress-nginx --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

# Copy Grafana/Prometheus values configuration file
- name: Copy grafana values
  copy:
    src: grafana-values.yaml
    dest: /tmp/grafana-values.yaml

# Copy ArgoCD values configuration file
- name: Copy argocd values
  copy:
    src: argocd-values.yaml
    dest: /tmp/argocd-values.yaml

# Copy CloudNativePG values configuration file
- name: Copy cnpg values
  copy:
    src: cnpg-values.yaml
    dest: /tmp/cnpg-values.yaml

# Install or upgrade Prometheus + Grafana monitoring stack
- name: Install kube-prometheus-stack
  become: false
  shell: |
    helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
      --namespace monitoring \
      --values /tmp/grafana-values.yaml \
      --wait --timeout 5m
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

# Install or upgrade ArgoCD for GitOps workflows
- name: Install ArgoCD
  become: false
  shell: |
    helm upgrade --install argocd argo/argo-cd \
      --namespace argocd \
      --values /tmp/argocd-values.yaml \
      --wait --timeout 5m
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

# Install or upgrade CloudNativePG PostgreSQL operator
- name: Install CloudNativePG
  become: false
  shell: |
    helm upgrade --install cnpg cnpg/cloudnative-pg \
      --namespace cnpg-system \
      --values /tmp/cnpg-values.yaml \
      --wait --timeout 5m
  environment:
    KUBECONFIG: /home/controlnode/.kube/config
