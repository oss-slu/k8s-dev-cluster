---
# Install Helm - the package manager for Kubernetes
# We use the official install script for simplicity
- name: Download Helm install script
  get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get-helm.sh
    mode: '0755'

- name: Install Helm
  shell: /tmp/get-helm.sh
  args:
    creates: /usr/local/bin/helm

# Add Helm repositories for each operator
# Think of these like apt repos but for Kubernetes apps
- name: Add Prometheus community Helm repo
  become: false
  shell: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

- name: Add ArgoCD Helm repo
  become: false
  shell: helm repo add argo https://argoproj.github.io/argo-helm
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

- name: Add CloudNativePG Helm repo
  become: false
  shell: helm repo add cnpg https://cloudnative-pg.github.io/charts
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

# Update all repos to get latest chart versions
- name: Update Helm repos
  become: false
  shell: helm repo update
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

# Create namespaces to keep operators organized
# Each operator lives in its own namespace
- name: Create monitoring namespace
  become: false
  shell: kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

- name: Create argocd namespace
  become: false
  shell: kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

- name: Create cnpg namespace
  become: false
  shell: kubectl create namespace cnpg-system --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

# Install kube-prometheus-stack
# Includes Prometheus, Grafana, AlertManager and pre-built dashboards
- name: Install kube-prometheus-stack
  become: false
  shell: |
    helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
      --namespace monitoring \
      --set grafana.adminPassword=admin123 \
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

# Install ArgoCD - GitOps continuous delivery tool
# This is what will deploy your apps from Git repos
- name: Install ArgoCD
  become: false
  shell: |
    helm upgrade --install argocd argo/argo-cd \
      --namespace argocd \
      --wait --timeout 5m
  environment:
    KUBECONFIG: /home/controlnode/.kube/config

# Install CloudNativePG operator
# Manages PostgreSQL clusters natively on Kubernetes
- name: Install CloudNativePG
  become: false
  shell: |
    helm upgrade --install cnpg cnpg/cloudnative-pg \
      --namespace cnpg-system \
      --wait --timeout 5m
  environment:
    KUBECONFIG: /home/controlnode/.kube/config
